version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '6543:5432'

  app:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://nest_prisma_docker_user:nRuY6OB0p6w0phAlBAxIGUWmhvI8Q8lu@dpg-d74m8hgule4c73f5mdlg-a:5432/nest_prisma_docker?sslmode=require"
    volumes:
      - .:/app
      - uploads:/app/uploads
    ports:
      - '3000:3000'
    command: pnpm start:dev

volumes:
  pgdata:
  uploads:
